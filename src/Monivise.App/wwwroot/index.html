<!DOCTYPE html>
<html lang="en" class="grey">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Monivise</title>
    <base href="/" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>" />
    <meta name="theme-color" content="#ffffff" />

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link href="Monivise.App.styles.css" rel="stylesheet" />

    <style>
        #blazor-error-ui {
            display: none;
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #dc2626;
            color: #fff;
            padding: 12px 16px;
            font-size: 14px;
            z-index: 9999;
        }

            #blazor-error-ui .reload,
            #blazor-error-ui .dismiss {
                color: #fff;
                text-decoration: underline;
                cursor: pointer;
                margin-left: 12px;
            }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--mv-border);
            border-top-color: var(--mv-accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;height:100dvh;flex-direction:column;gap:16px;">
            <div class="loading-spinner"></div>
            <p style="font-size:13px;color:var(--mv-text-tertiary);margin:0;">Initializing Monivise…</p>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script>
        window.monivise = window.monivise || {};
        window.monivise.connectivity = {
            register: function (dotnetRef) {
                const notify = () => dotnetRef.invokeMethodAsync('OnConnectivityChanged', navigator.onLine);
                window.addEventListener('online', notify);
                window.addEventListener('offline', notify);
                notify();
            }
        };
        window.monivise.theme = {
            isDark: () => document.documentElement.classList.contains('dark'),
            set: (dark) => {
                document.documentElement.classList.toggle('dark', dark);
                localStorage.setItem('mv-theme', dark ? 'dark' : 'light');
            }
        };
        // Restore theme on load
        (function () {
            const saved = localStorage.getItem('mv-theme');
            if (saved === 'dark') {
                document.documentElement.classList.add('dark');
            } else if (saved === 'light') {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>

    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
